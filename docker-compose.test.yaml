services:
  test_db:
    image: postgres:15
    container_name: test-cake-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_cake_db
    ports:
      - '5433:5432'
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    networks:
      - test-cake-network

volumes:
  test_postgres_data:

networks:
  test-cake-network:
    driver: bridge
